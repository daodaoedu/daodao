name: Sync Shared Config

on:
  push:
    branches: [main]
    paths:
      - '.claude/shared/**'
      - '.claude/sync.sh'
      - 'bin/pipeline.config.json'
      - '.github/workflows/auto-pr-description.yml'
      - '.github/workflows/code-review.yml'
  schedule:
    # 每週一 UTC 01:00 (台灣 09:00)
    - cron: '0 1 * * 1'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - daodao-f2e
          - daodao-server
          - daodao-ai-backend
          - daodao-storage
          - daodao-worker
          - daodao-infra
          - daodao-admin-ui
          - daodao-mcp
    steps:
      - name: Checkout infra
        uses: actions/checkout@v4

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          token: ${{ secrets.REPO_SYNC_TOKEN }}
          path: target

      - name: Sync shared harness (single implementation: .claude/sync.sh)
        run: |
          # sync.sh 期望「父目錄下有各 repo 目錄」的結構，用 symlink 模擬
          mkdir -p sync-parent
          ln -s "$PWD/target" "sync-parent/${{ matrix.repo }}"
          .claude/sync.sh "$PWD/sync-parent"

      - name: Check for changes
        id: diff
        working-directory: target
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Get default branch
        if: steps.diff.outputs.changed == 'true'
        id: default-branch
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        run: |
          DEFAULT=$(gh repo view --json defaultBranchRef -q '.defaultBranchRef.name')
          echo "branch=$DEFAULT" >> $GITHUB_OUTPUT

      - name: Create PR and merge
        if: steps.diff.outputs.changed == 'true'
        working-directory: target
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
          DEFAULT_BRANCH: ${{ steps.default-branch.outputs.branch }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BRANCH="chore/sync-claude-config-$(date +%Y%m%d%H%M)"
          git checkout -b "$BRANCH"
          git add -f .claude/ .github/workflows/
          git commit -m "chore: sync shared config from daodao

          Auto-synced hooks, settings, and workflows from daodao/.claude"
          git push origin "$BRANCH"
          PR_URL=$(gh pr create \
            --title "chore: sync shared config" \
            --body "Auto-synced from daodao/.claude. Updates hooks, settings, and workflows." \
            --base "$DEFAULT_BRANCH")
          if gh pr merge "$PR_URL" --squash --admin 2>/dev/null; then
            echo "✅ PR merged: $PR_URL"
          else
            echo "✅ PR created (manual merge required): $PR_URL"
          fi
