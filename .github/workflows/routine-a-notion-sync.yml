name: Routine A — Notion → GitHub Issue Sync

on:
  schedule:
    - cron: '0 * * * *'  # every hour UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no actual changes)'
        type: boolean
        default: false

jobs:
  sync:
    name: Sync Notion tasks to GitHub issues
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.15.1'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Routine A
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          GH_TOKEN: ${{ secrets.GIT_HUB_ACCESS_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          pnpm tsx bin/notion-sync/sync.ts $ARGS
