schema: spec-driven

context: |
  # {{PROJECT_NAME}}
  {{PROJECT_DESCRIPTION}}

  ## 技術棧
  # 依照你的專案結構填入，範例：
  # - 前端: Next.js + React + Tailwind CSS
  # - 後端: Express + TypeScript + Prisma (PostgreSQL)
  # - AI 服務: FastAPI + Python
  # - Worker: Hono + Cloudflare Workers
  # - DB: PostgreSQL + SQL migrations
  # - Infra: Docker Compose + Nginx

  ## 開發慣例
  # 依照你的團隊慣例填入，範例：
  # - 繁體中文互動，commit message 用繁體中文
  # - Conventional commits: type(scope): 描述
  # - 禁止 any type，用 Zod 驗證
  # - 每個新功能必須附測試，修 bug 必須附 regression test

rules:
  proposal:
    - 使用繁體中文撰寫
    - 明確標註影響哪些子專案或模組
    - 包含「Non-goals」段落
  design:
    - 跨模組功能需分別描述各模組的實作方式
    - API 設計遵循 RESTful + Zod validation + OpenAPI
    - 資料庫變更需包含 migration SQL
  tasks:
    - 每個 task 控制在 2-4 小時
    - 標註該 task 屬於哪個模組或子專案
    - 包含驗收條件（acceptance criteria）
